<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicSet — タイムテーブルを開く</title>
  <meta name="description" content="MusicSetアプリでタイムテーブルを確認しよう">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: linear-gradient(180deg, #EEF4FF 0%, #fff 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1C1C2E;
    }
    .card {
      text-align: center;
      padding: 48px 32px;
      max-width: 360px;
      width: 100%;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #5BA4E5, #8B7FD4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 24px;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 15px;
      color: #6B7280;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: #1C1C2E;
      color: white;
      border-radius: 100px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: opacity 0.2s;
      margin-bottom: 12px;
    }
    .btn:hover { opacity: 0.8; }
    .btn-store {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: transparent;
      color: #6B7280;
      border: 1.5px solid #e5e7eb;
      border-radius: 100px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .btn-store:hover { opacity: 0.7; }
    .note {
      font-size: 12px;
      color: #9CA3AF;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎪</div>
    <h1>タイムテーブルを確認</h1>
    <p>MusicSetアプリで開いてください</p>
    <a href="#" class="btn" id="open-btn">アプリで開く</a>
    <br>
    <a href="https://apps.apple.com/jp/app/musicset/id6763155689" class="btn-store">
      App Storeでダウンロード
    </a>
    <p class="note" id="note-text"></p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (!id) {
      window.location.href = '/';
    } else {
      const appURL = 'musicset://festival/' + id;
      const openBtn = document.getElementById('open-btn');
      openBtn.href = appURL;

      // Safariでは自動起動を試みる（アプリが開けば visibilitychange で hidden になる）
      let launched = false;
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) launched = true;
      });
      window.location.href = appURL;
    }
  </script>
</body>
</html>
